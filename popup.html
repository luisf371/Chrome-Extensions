<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sBookmarkCleaner</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h1>sBookmarkCleaner</h1>
        <button id="theme-toggle" class="theme-toggle" title="Toggle Dark Mode">
            <svg class="icon-sun" viewBox="0 0 24 24">
               <circle cx="12" cy="12" r="5"></circle>
               <line x1="12" y1="1" x2="12" y2="3"></line>
               <line x1="12" y1="21" x2="12" y2="23"></line>
               <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
               <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
               <line x1="1" y1="12" x2="3" y2="12"></line>
               <line x1="21" y1="12" x2="23" y2="12"></line>
               <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
               <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <svg class="icon-moon" viewBox="0 0 24 24">
               <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
        </button>
    </div>
    
    <div id="status-container">
      <p id="status-text">Ready to scan.</p>
      <div class="progress-bar-bg">
        <div id="progress-bar" class="progress-bar-fill"></div>
      </div>
      <p id="progress-counts">0 / 0</p>
    </div>

    <div class="stats">
      <div class="stat-box">
        <span class="stat-label">Broken</span>
        <span id="broken-count" class="stat-number">0</span>
        <span id="last-scan-broken" class="stat-timestamp">Never scanned</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">Duplicates</span>
        <span id="duplicate-count" class="stat-number">0</span>
        <span id="last-scan-duplicates" class="stat-timestamp">Never scanned</span>
      </div>
    </div>

    <div class="actions">
      <button id="btn-broken" class="btn-action">Find Broken Links</button>
      <button id="btn-duplicates" class="btn-action">Find Duplicates</button>
      <button id="btn-sort" class="btn-action">Sort Bookmarks</button>
      <button id="btn-report" disabled>View Report</button>
      <button id="btn-options" style="background-color: #95a5a6; color: white;">Options</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
