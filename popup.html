<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sBookmarkCleaner</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="popup">
  <div class="container">
    <div style="display: flex; align-items: center; margin-bottom: 20px;">
        <!-- Left: Title -->
        <h1 style="font-size: 1.2rem; margin: 0; margin-right: auto;">sBookmarkCleaner</h1>

        <!-- Right: Controls -->
        <div style="display: flex; gap: 8px; align-items: center;">
            <button id="theme-toggle" class="theme-toggle" title="Toggle Dark Mode">
                <svg class="icon-sun" viewBox="0 0 24 24">
                   <circle cx="12" cy="12" r="5"></circle>
                   <line x1="12" y1="1" x2="12" y2="3"></line>
                   <line x1="12" y1="21" x2="12" y2="23"></line>
                   <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                   <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                   <line x1="1" y1="12" x2="3" y2="12"></line>
                   <line x1="21" y1="12" x2="23" y2="12"></line>
                   <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                   <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
                <svg class="icon-moon" viewBox="0 0 24 24">
                   <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>

            <button id="btn-options" class="icon-btn" title="Settings">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                    <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
                </svg>
            </button>
        </div>
    </div>
    
    <div id="status-container">
      <p id="status-text">Ready to scan.</p>
      <div class="progress-bar-bg">
        <div id="progress-bar" class="progress-bar-fill"></div>
      </div>
      <p id="progress-counts">0 / 0</p>
    </div>

    <div class="stats">
      <div class="stat-box">
        <span class="stat-label">Broken</span>
        <span id="broken-count" class="stat-number">0</span>
        <span id="last-scan-broken" class="stat-timestamp">Never scanned</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">Duplicates</span>
        <span id="duplicate-count" class="stat-number">0</span>
        <span id="last-scan-duplicates" class="stat-timestamp">Never scanned</span>
      </div>
    </div>

    <div class="actions">
      <button id="btn-broken" class="btn-action">Find Broken Links</button>
      <button id="btn-duplicates" class="btn-action">Find Duplicates</button>
      <button id="btn-sort" class="btn-action">Sort Bookmarks</button>
      <button id="btn-report" class="btn-action" disabled>View Report</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
