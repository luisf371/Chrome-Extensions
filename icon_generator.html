<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Icon Generator & Theme Selector</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; background: #e0e0e0; padding: 40px; color: #333; }
        h1 { margin-bottom: 30px; }
        
        .main-container {
            display: flex;
            gap: 40px;
            align-items: flex-start;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .preview-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .icon-wrapper {
            /* High contrast border and checkerboard background to see edges/transparency clearly */
            border: 2px solid #ff0000; 
            background-color: #fff;
            background-image: linear-gradient(45deg, #ccc 25%, transparent 25%), 
                              linear-gradient(-45deg, #ccc 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #ccc 75%), 
                              linear-gradient(-45deg, transparent 75%, #ccc 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            padding: 0;
            display: flex;
            overflow: hidden; /* Ensure anything outside is clipped at 128px */
        }

        .icon-preview {
            width: 128px;
            height: 128px;
            display: block;
        }

        .controls-area {
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 250px;
        }

        .theme-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .theme-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .theme-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 3px solid transparent;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            position: relative;
        }
        
        .theme-btn:hover { transform: scale(1.1); }
        .theme-btn.active { border-color: #333; transform: scale(1.1); }

        .download-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
        }

        button.download-btn { 
            padding: 10px 20px; 
            cursor: pointer; 
            background: #1a73e8; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            font-size: 14px; 
            font-weight: 500;
            transition: background 0.2s;
        }
        button.download-btn:hover { background: #1557b0; }
        
        label { font-weight: 600; font-size: 0.9em; color: #555; }
    </style>
</head>
<body>
    <h1>sTabControl Icon Designer</h1>
    
    <div class="main-container">
        <div class="preview-area">
            <label>Preview (Red Border = 128px limit)</label>
            <div class="icon-wrapper">
                <div id="svg-container" class="icon-preview">
                    <!-- Inline SVG for direct manipulation -->
                    <svg id="master-svg" width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
                      <defs>
                        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                          <feDropShadow dx="2" dy="2" stdDeviation="1.5" flood-color="#000" flood-opacity="0.3"/>
                        </filter>
                      </defs>
                      
                      <g transform="translate(64, 64) scale(1.1) translate(-69, -65)">
                          <path id="tab-back" d="M 14,90 L 24,30 Q 29,20 39,20 L 79,20 Q 89,20 94,30 L 104,90 Z" 
                                fill="#9AA0A6" stroke="#fff" stroke-width="2" filter="url(#shadow)" />
                        
                          <path id="tab-middle" d="M 34,100 L 44,40 Q 49,30 59,30 L 99,30 Q 109,30 114,40 L 124,100 Z" 
                                fill="#8AB4F8" stroke="#fff" stroke-width="2" filter="url(#shadow)" />
                        
                          <path id="tab-front" d="M 24,110 L 34,50 Q 39,40 49,40 L 89,40 Q 99,40 104,50 L 114,110 Z" 
                                fill="#1A73E8" stroke="#fff" stroke-width="2" filter="url(#shadow)" />
                      </g>
                    </svg>
                </div>
            </div>
        </div>

        <div class="controls-area">
            <div class="theme-section">
                <label>Select Theme</label>
                <div class="theme-grid" id="theme-grid">
                    <!-- Generated by JS -->
                </div>
            </div>

            <div class="download-section">
                <label>Export</label>
                <button class="download-btn" onclick="downloadIcon(16)">Download 16x16</button>
                <button class="download-btn" onclick="downloadIcon(48)">Download 48x48</button>
                <button class="download-btn" onclick="downloadIcon(128)">Download 128x128</button>
            </div>
        </div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const themes = {
            'blue': { back: '#9AA0A6', middle: '#8AB4F8', front: '#1A73E8', primary: '#1A73E8' },
            'dark': { back: '#5f6368', middle: '#3c4043', front: '#202124', primary: '#202124' },
            'red':  { back: '#E57373', middle: '#EF5350', front: '#D32F2F', primary: '#D32F2F' },
            'green':{ back: '#81C995', middle: '#34A853', front: '#188038', primary: '#188038' },
            'orange':{back: '#FFCC80', middle: '#FFA726', front: '#F57C00', primary: '#F57C00' },
            'purple':{back: '#CE93D8', middle: '#AB47BC', front: '#7B1FA2', primary: '#7B1FA2' },
            'teal': { back: '#80CBC4', middle: '#26A69A', front: '#00796B', primary: '#00796B' },
            'pink': { back: '#F48FB1', middle: '#EC407A', front: '#C2185B', primary: '#C2185B' },
            'yellow':{back: '#FFF59D', middle: '#FFEB3B', front: '#FBC02D', primary: '#FBC02D' }
        };

        let currentTheme = 'blue';

        function init() {
            const grid = document.getElementById('theme-grid');
            
            for (const [key, colors] of Object.entries(themes)) {
                const btn = document.createElement('div');
                btn.className = `theme-btn ${key === currentTheme ? 'active' : ''}`;
                btn.style.background = `linear-gradient(135deg, ${colors.front} 50%, ${colors.middle} 50%)`;
                btn.title = key.charAt(0).toUpperCase() + key.slice(1);
                btn.onclick = () => applyTheme(key);
                grid.appendChild(btn);
            }
        }

        function applyTheme(themeName) {
            currentTheme = themeName;
            const colors = themes[themeName];
            
            document.getElementById('tab-back').setAttribute('fill', colors.back);
            document.getElementById('tab-middle').setAttribute('fill', colors.middle);
            document.getElementById('tab-front').setAttribute('fill', colors.front);

            // Update UI selection
            document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));
            // This is a simple index lookup match, assuming order hasn't changed
            const index = Object.keys(themes).indexOf(themeName);
            document.getElementById('theme-grid').children[index].classList.add('active');
        }

        function downloadIcon(size) {
            const svg = document.getElementById('master-svg');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            
            // Need to serialize SVG to data URI for drawing on canvas
            const svgData = new XMLSerializer().serializeToString(svg);
            const img = new Image();
            const svgBlob = new Blob([svgData], {type: 'image/svg+xml;charset=utf-8'});
            const url = URL.createObjectURL(svgBlob);

            img.onload = function() {
                canvas.width = size;
                canvas.height = size;
                ctx.clearRect(0, 0, size, size);
                ctx.drawImage(img, 0, 0, size, size);
                
                const dataURL = canvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.download = `stack-${currentTheme}-${size}.png`;
                link.href = dataURL;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            };

            img.src = url;
        }

        init();
    </script>
</body>
</html>
