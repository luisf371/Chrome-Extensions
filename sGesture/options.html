<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="extName">sGestures Config</title>
    <link rel="stylesheet" href="options.css">
</head>
<body>
    <div class="container">
        <header>
            <h1 data-i18n="optionsTitle">sGestures</h1>
            <div class="header-actions">
                <span class="version-badge">v1.2</span>
                <button class="theme-toggle" id="themeToggle" title="Toggle theme">
                    <svg class="icon-sun" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg class="icon-moon" viewBox="0 0 24 24">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </div>
        </header>

        <main>
            <!-- Settings Section -->
            <section class="section">
                <h2 class="section-title" data-i18n="sectionSettings">Settings</h2>
                <div class="settings-card">
                    <div class="form-row">
                        <label class="form-label">
                            <span data-i18n="optTrail">Gesture Trails</span>
                            <span class="tooltip">
                                <span class="tooltip-icon">?</span>
                                <span class="tooltiptext" data-i18n="optTrailDesc">Enable or disable gesture trails.</span>
                            </span>
                        </label>
                        <label class="toggle-switch">
                            <input type="checkbox" id="trail" checked>
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    <div class="form-row">
                        <label class="form-label">
                            <span data-i18n="optRocker">Rocker Gestures</span>
                            <span class="tooltip">
                                <span class="tooltip-icon">?</span>
                                <span class="tooltiptext" data-i18n="optRockerDesc">Navigate back/forward by clicking one mouse button while holding the other (Opera-style).</span>
                            </span>
                        </label>
                        <label class="toggle-switch">
                            <input type="checkbox" id="rocker" checked>
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    <div class="form-row rocker-info" id="rockerInfo">
                        <div class="rocker-mappings">
                            <div class="rocker-item">
                                <span class="rocker-combo" data-i18n="rockerRightLeft">Right + Left</span>
                                <span class="rocker-arrow">→</span>
                                <select id="rocker-RL" class="rocker-select">
                                    <option value="newtab" data-i18n="actionNewTab">Open New Tab</option>
                                    <option value="closetab" data-i18n="actionCloseTab">Close Current Tab</option>
                                    <option value="reload" data-i18n="actionReload">Reload</option>
                                    <option value="back" data-i18n="actionBack">History Back</option>
                                    <option value="forward" data-i18n="actionForward">History Forward</option>
                                    <option value="stop" data-i18n="actionStop">Stop Loading</option>
                                    <option value="closeback" data-i18n="actionCloseBackground">Close Background Tabs</option>
                                    <option value="closeall" data-i18n="actionCloseWindow">Close Window</option>
                                    <option value="reloadall" data-i18n="actionReloadAll">Reload All Tabs</option>
                                    <option value="nexttab" data-i18n="actionNextTab">Next Tab</option>
                                    <option value="prevtab" data-i18n="actionPrevTab">Previous Tab</option>
                                    <option value="scrolltop" data-i18n="actionScrollTop">Scroll to Top</option>
                                    <option value="scrollbottom" data-i18n="actionScrollBottom">Scroll to Bottom</option>
                                    <option value="lasttab" data-i18n="actionLastTab">Re-open Last Closed Tab</option>
                                </select>
                            </div>
                            <div class="rocker-item">
                                <span class="rocker-combo" data-i18n="rockerLeftRight">Left + Right</span>
                                <span class="rocker-arrow">→</span>
                                <select id="rocker-LR" class="rocker-select">
                                    <option value="newtab" data-i18n="actionNewTab">Open New Tab</option>
                                    <option value="closetab" data-i18n="actionCloseTab">Close Current Tab</option>
                                    <option value="reload" data-i18n="actionReload">Reload</option>
                                    <option value="back" data-i18n="actionBack">History Back</option>
                                    <option value="forward" data-i18n="actionForward">History Forward</option>
                                    <option value="stop" data-i18n="actionStop">Stop Loading</option>
                                    <option value="closeback" data-i18n="actionCloseBackground">Close Background Tabs</option>
                                    <option value="closeall" data-i18n="actionCloseWindow">Close Window</option>
                                    <option value="reloadall" data-i18n="actionReloadAll">Reload All Tabs</option>
                                    <option value="nexttab" data-i18n="actionNextTab">Next Tab</option>
                                    <option value="prevtab" data-i18n="actionPrevTab">Previous Tab</option>
                                    <option value="scrolltop" data-i18n="actionScrollTop">Scroll to Top</option>
                                    <option value="scrollbottom" data-i18n="actionScrollBottom">Scroll to Bottom</option>
                                    <option value="lasttab" data-i18n="actionLastTab">Re-open Last Closed Tab</option>
                                </select>
                            </div>
                        </div>
                        <p class="rocker-hint" data-i18n="rockerHint">Hold first button, then click second button to trigger.</p>
                    </div>
                    <div class="form-row">
                        <label class="form-label" data-i18n="optColor">Gesture Color</label>
                        <select id="color">
                            <option value="red" data-i18n="colorRed">Red</option>
                            <option value="green" data-i18n="colorGreen">Green</option>
                            <option value="blue" data-i18n="colorBlue">Blue</option>
                            <option value="yellow" data-i18n="colorYellow">Yellow</option>
                            <option value="black" data-i18n="colorBlack">Black</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <label class="form-label" data-i18n="optWidth">Gesture Width</label>
                        <select id="width">
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3" selected>3</option>
                            <option value="4">4</option>
                            <option value="5">5</option>
                        </select>
                    </div>
                </div>
            </section>

            <!-- Gestures Section -->
            <section class="section">
                <h2 class="section-title" data-i18n="sectionGestures">Gesture Actions</h2>
                <div class="settings-card">
                    <table class="gesture-table">
                        <thead>
                            <tr>
                                <th data-i18n="colGesture">Gesture</th>
                                <th data-i18n="colAction">Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>
                                    <span class="gesture-direction">
                                        <span class="gesture-icon">↑</span>
                                        <span class="gesture-name" data-i18n="gestureUp">Mouse Up</span>
                                    </span>
                                </td>
                                <td>
                                    <select id="gesture-U">
                                        <option value="newtab" data-i18n="actionNewTab">Open New Tab</option>
                                        <option value="closetab" data-i18n="actionCloseTab">Close Current Tab</option>
                                        <option value="reload" data-i18n="actionReload">Reload</option>
                                        <option value="back" data-i18n="actionBack">History Back</option>
                                        <option value="forward" data-i18n="actionForward">History Forward</option>
                                        <option value="stop" data-i18n="actionStop">Stop Loading</option>
                                        <option value="closeback" data-i18n="actionCloseBackground">Close Background Tabs</option>
                                        <option value="closeall" data-i18n="actionCloseWindow">Close Window</option>
                                        <option value="reloadall" data-i18n="actionReloadAll">Reload All Tabs</option>
                                        <option value="nexttab" data-i18n="actionNextTab">Next Tab</option>
                                        <option value="prevtab" data-i18n="actionPrevTab">Previous Tab</option>
                                        <option value="scrolltop" data-i18n="actionScrollTop">Scroll to Top</option>
                                        <option value="scrollbottom" data-i18n="actionScrollBottom">Scroll to Bottom</option>
                                        <option value="lasttab" data-i18n="actionLastTab">Re-open Last Closed Tab</option>
                                    </select>
                                </td>
                            </tr>
                            <tr>
                                <td>
                                    <span class="gesture-direction">
                                        <span class="gesture-icon">↓</span>
                                        <span class="gesture-name" data-i18n="gestureDown">Mouse Down</span>
                                    </span>
                                </td>
                                <td>
                                    <select id="gesture-D">
                                        <option value="newtab" data-i18n="actionNewTab">Open New Tab</option>
                                        <option value="closetab" data-i18n="actionCloseTab">Close Current Tab</option>
                                        <option value="reload" data-i18n="actionReload">Reload</option>
                                        <option value="back" data-i18n="actionBack">History Back</option>
                                        <option value="forward" data-i18n="actionForward">History Forward</option>
                                        <option value="stop" data-i18n="actionStop">Stop Loading</option>
                                        <option value="closeback" data-i18n="actionCloseBackground">Close Background Tabs</option>
                                        <option value="closeall" data-i18n="actionCloseWindow">Close Window</option>
                                        <option value="reloadall" data-i18n="actionReloadAll">Reload All Tabs</option>
                                        <option value="nexttab" data-i18n="actionNextTab">Next Tab</option>
                                        <option value="prevtab" data-i18n="actionPrevTab">Previous Tab</option>
                                        <option value="scrolltop" data-i18n="actionScrollTop">Scroll to Top</option>
                                        <option value="scrollbottom" data-i18n="actionScrollBottom">Scroll to Bottom</option>
                                        <option value="lasttab" data-i18n="actionLastTab">Re-open Last Closed Tab</option>
                                    </select>
                                </td>
                            </tr>
                            <tr>
                                <td>
                                    <span class="gesture-direction">
                                        <span class="gesture-icon">←</span>
                                        <span class="gesture-name" data-i18n="gestureLeft">Mouse Left</span>
                                    </span>
                                </td>
                                <td>
                                    <select id="gesture-L">
                                        <option value="newtab" data-i18n="actionNewTab">Open New Tab</option>
                                        <option value="closetab" data-i18n="actionCloseTab">Close Current Tab</option>
                                        <option value="reload" data-i18n="actionReload">Reload</option>
                                        <option value="back" data-i18n="actionBack">History Back</option>
                                        <option value="forward" data-i18n="actionForward">History Forward</option>
                                        <option value="stop" data-i18n="actionStop">Stop Loading</option>
                                        <option value="closeback" data-i18n="actionCloseBackground">Close Background Tabs</option>
                                        <option value="closeall" data-i18n="actionCloseWindow">Close Window</option>
                                        <option value="reloadall" data-i18n="actionReloadAll">Reload All Tabs</option>
                                        <option value="nexttab" data-i18n="actionNextTab">Next Tab</option>
                                        <option value="prevtab" data-i18n="actionPrevTab">Previous Tab</option>
                                        <option value="scrolltop" data-i18n="actionScrollTop">Scroll to Top</option>
                                        <option value="scrollbottom" data-i18n="actionScrollBottom">Scroll to Bottom</option>
                                        <option value="lasttab" data-i18n="actionLastTab">Re-open Last Closed Tab</option>
                                    </select>
                                </td>
                            </tr>
                            <tr>
                                <td>
                                    <span class="gesture-direction">
                                        <span class="gesture-icon">→</span>
                                        <span class="gesture-name" data-i18n="gestureRight">Mouse Right</span>
                                    </span>
                                </td>
                                <td>
                                    <select id="gesture-R">
                                        <option value="newtab" data-i18n="actionNewTab">Open New Tab</option>
                                        <option value="closetab" data-i18n="actionCloseTab">Close Current Tab</option>
                                        <option value="reload" data-i18n="actionReload">Reload</option>
                                        <option value="back" data-i18n="actionBack">History Back</option>
                                        <option value="forward" data-i18n="actionForward">History Forward</option>
                                        <option value="stop" data-i18n="actionStop">Stop Loading</option>
                                        <option value="closeback" data-i18n="actionCloseBackground">Close Background Tabs</option>
                                        <option value="closeall" data-i18n="actionCloseWindow">Close Window</option>
                                        <option value="reloadall" data-i18n="actionReloadAll">Reload All Tabs</option>
                                        <option value="nexttab" data-i18n="actionNextTab">Next Tab</option>
                                        <option value="prevtab" data-i18n="actionPrevTab">Previous Tab</option>
                                        <option value="scrolltop" data-i18n="actionScrollTop">Scroll to Top</option>
                                        <option value="scrollbottom" data-i18n="actionScrollBottom">Scroll to Bottom</option>
                                        <option value="lasttab" data-i18n="actionLastTab">Re-open Last Closed Tab</option>
                                    </select>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Footer -->
            <div class="footer">
                <span>Contact: <a href="mailto:extension@tekky.cc">extension@tekky.cc</a></span>
                <span>Developer: <a href="https://tekky.cc">tekky.cc</a></span>
            </div>
        </main>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">
        <span class="toast-icon">✓</span>
        <span class="toast-message">Saved</span>
    </div>

    <script src="options.js"></script>
</body>
</html>
