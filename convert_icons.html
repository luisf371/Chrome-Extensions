<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Icon Converter</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f0f0; }
        h1 { margin-bottom: 20px; }
        .icon-grid { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; }
        .icon-card { 
            background: white; 
            padding: 20px; 
            border-radius: 8px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }
        .icon-card:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.15); }
        .icon-card.selected { border-color: #4285f4; background: #e8f0fe; }
        .icon-preview { width: 128px; height: 128px; margin-bottom: 10px; }
        button { 
            padding: 10px 20px; 
            font-size: 16px; 
            background: #4285f4; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
        }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #output { margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap;}
        .download-link {
            display: inline-block;
            padding: 8px 12px;
            background: #34a853;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<h1>Select an Icon to Convert</h1>

<div class="icon-grid" id="iconGrid">
    <!-- Icon Cards will be injected here -->
</div>

<button id="convertBtn" disabled>Convert Selected Icon to PNGs</button>

<div id="output"></div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    const icons = [
        { name: 'icon.svg', svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="4 8 120 120">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4285f4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <path d="M28 10h72c4.4 0 8 3.6 8 8v100l-44-22-44 22V18c0-4.4 3.6-8 8-8z" fill="url(#grad1)" filter="url(#shadow)" />
  <rect x="44" y="35" width="40" height="6" rx="2" ry="2" fill="white" fill-opacity="0.9" />
  <rect x="44" y="52" width="40" height="6" rx="2" ry="2" fill="white" fill-opacity="0.9" />
  <rect x="44" y="69" width="28" height="6" rx="2" ry="2" fill="white" fill-opacity="0.9" />
  <path d="M28 10h72c4.4 0 8 3.6 8 8v4c0-2.2-1.8-4-4-4H24c-2.2 0-4 1.8-4 4v-4c0-4.4 3.6-8 8-8z" fill="white" fill-opacity="0.2"/>
</svg>` },
        { name: 'icon2.svg', svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="10 10 108 108">
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#009688;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#004d40;stop-opacity:1" />
    </linearGradient>
  </defs>
  <path d="M28 10h72c4.4 0 8 3.6 8 8v100l-44-22-44 22V18c0-4.4 3.6-8 8-8z" fill="url(#grad2)" />
  <circle cx="64" cy="35" r="6" fill="white" />
  <path d="M64 41 v10 h-20 v10" stroke="white" stroke-width="4" fill="none" />
  <circle cx="44" cy="67" r="5" fill="white" opacity="0.9" />
  <path d="M64 41 v10 h20 v10" stroke="white" stroke-width="4" fill="none" />
  <circle cx="84" cy="67" r="5" fill="white" opacity="0.9" />
  <path d="M44 72 v10 h10 v6" stroke="white" stroke-width="3" fill="none" />
  <circle cx="54" cy="92" r="4" fill="white" opacity="0.8" />
</svg>` },
        { name: 'icon3.svg', svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="10 15 108 108">
  <defs>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbc02d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f57f17;stop-opacity:1" />
    </linearGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  <path d="M14 30 L114 30 L114 100 A 10 10 0 0 1 104 110 L24 110 A 10 10 0 0 1 14 100 Z" fill="#f9a825" />
  <path d="M14 45 L50 45 L60 35 L114 35 L114 100 A 10 10 0 0 1 104 110 L24 110 A 10 10 0 0 1 14 100 Z" fill="url(#grad3)" filter="url(#dropShadow)" />
  <path d="M64 55 l6 18 h18 l-14 11 5 18 -15 -10 -15 10 5 -18 -14 -11 h18 z" fill="#fff" stroke="#f57f17" stroke-width="2" />
</svg>` },
        { name: 'icon4.svg', svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="11 15 106 106">
  <defs>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e53935;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d32f2f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b71c1c;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow4">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  <path d="M28 20 h24 v60 L28 20 z" fill="#c62828" />
  <path d="M28 20 h24 v88 H28 z" fill="url(#grad4)" filter="url(#shadow4)" />
  <path d="M76 20 h24 v88 H76 z" fill="url(#grad4)" filter="url(#shadow4)" />
  <path d="M52 20 h24 L76 108 H52 z" fill="#ef5350" />
  <path d="M28 108 l12 10 12 -10 v-10 h-24 z" fill="#b71c1c" />
  <path d="M76 108 l12 10 12 -10 v-10 h-24 z" fill="#b71c1c" />
</svg>` },
        { name: 'icon5.svg', svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="15 10 105 105">
  <defs>
    <radialGradient id="grad5" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#4fc3f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0288d1;stop-opacity:1" />
    </radialGradient>
  </defs>
  <rect x="30" y="15" width="68" height="98" rx="8" ry="8" fill="#fff" stroke="#cfd8dc" stroke-width="2" />
  <rect x="42" y="30" width="44" height="6" rx="2" fill="#b0bec5" />
  <rect x="42" y="44" width="44" height="6" rx="2" fill="#b0bec5" />
  <rect x="42" y="58" width="44" height="6" rx="2" fill="#b0bec5" />
  <rect x="42" y="72" width="28" height="6" rx="2" fill="#b0bec5" />
  <path d="M85 85 l20 20" stroke="#546e7a" stroke-width="12" stroke-linecap="round" />
  <circle cx="75" cy="75" r="24" fill="url(#grad5)" stroke="#546e7a" stroke-width="6" />
  <path d="M65 65 q10 -10 20 0" stroke="white" stroke-width="3" fill="none" opacity="0.6" stroke-linecap="round" />
</svg>` },
        { name: 'icon6.svg', svg: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="10 15 108 108">
  <defs>
    <linearGradient id="grad6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#455a64;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#263238;stop-opacity:1" />
    </linearGradient>
    <filter id="dropShadow6" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.5"/>
    </filter>
  </defs>
  <path d="M14 30 L114 30 L114 100 A 10 10 0 0 1 104 110 L24 110 A 10 10 0 0 1 14 100 Z" fill="#263238" />
  <path d="M14 45 L50 45 L60 35 L114 35 L114 100 A 10 10 0 0 1 104 110 L24 110 A 10 10 0 0 1 14 100 Z" fill="url(#grad6)" filter="url(#dropShadow6)" />
  <path d="M64 55 l6 18 h18 l-14 11 5 18 -15 -10 -15 10 5 -18 -14 -11 h18 z" fill="#ffca28" stroke="#ff6f00" stroke-width="2" />
</svg>` }
    ];

    let selectedIconIndex = -1;

    function init() {
        const grid = document.getElementById('iconGrid');
        icons.forEach((icon, index) => {
            const card = document.createElement('div');
            card.className = 'icon-card';
            card.innerHTML = `
                <div class="icon-preview">${icon.svg}</div>
                <strong>${icon.name}</strong>
            `;
            card.onclick = () => selectIcon(index, card);
            grid.appendChild(card);
        });

        document.getElementById('convertBtn').onclick = convertSelected;
    }

    function selectIcon(index, cardElement) {
        selectedIconIndex = index;
        document.querySelectorAll('.icon-card').forEach(c => c.classList.remove('selected'));
        cardElement.classList.add('selected');
        document.getElementById('convertBtn').disabled = false;
    }

    function convertSelected() {
        if (selectedIconIndex < 0) return;
        
        const outputDiv = document.getElementById('output');
        outputDiv.innerHTML = ''; // Clear previous
        
        const svgString = icons[selectedIconIndex].svg;
        const img = new Image();
        const svgBlob = new Blob([svgString], {type: 'image/svg+xml;charset=utf-8'});
        const url = URL.createObjectURL(svgBlob);
        
        img.onload = function() {
            const sizes = [16, 32, 48, 128];
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            
            sizes.forEach(size => {
                canvas.width = size;
                canvas.height = size;
                ctx.clearRect(0, 0, size, size);
                ctx.drawImage(img, 0, 0, size, size);
                
                const dataUrl = canvas.toDataURL('image/png');
                
                // Create download link
                const link = document.createElement('a');
                link.href = dataUrl;
                link.download = `icon${size}.png`;
                link.className = 'download-link';
                link.innerText = `Download icon${size}.png`;
                outputDiv.appendChild(link);
            });
            
            URL.revokeObjectURL(url);
        };
        
        img.src = url;
    }

    init();
</script>
</body>
</html>
