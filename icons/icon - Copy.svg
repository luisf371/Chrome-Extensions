<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bin-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9eff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0984e3;stop-opacity:1" />
    </linearGradient>
     <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" />
      <feOffset dx="0" dy="2" result="offsetblur" />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Trash Can Lid -->
  <path d="M34 32 h60 v10 h-60 z M44 22 h40 v10 h-40 z" fill="#2c3e50" />
  
  <!-- Trash Can Body -->
  <path d="M40 46 h48 l-6 68 h-36 z" fill="url(#bin-grad)" filter="url(#shadow)" />
  
  <!-- Vertical Slats/Details on Bin -->
  <path d="M54 56 v48 M64 56 v48 M74 56 v48" stroke="rgba(255,255,255,0.3)" stroke-width="4" stroke-linecap="round" />
  
  <!-- Bookmark Icon (Sticking out/On Bin) -->
  <!-- A gold bookmark ribbon hanging over the front edge to signify "Bookmark" -->
  <path d="M82 46 v30 l-10 -10 l-10 10 v-30" fill="#f39c12" stroke="#2c3e50" stroke-width="2" />

</svg>