<!DOCTYPE html>
<head>
<title>sTabControl Options</title>
<style>
body {
   margin: 0;
   min-height: 100vh;
   font-family: "Segoe UI", Arial, sans-serif;
   background-color: #121212;
   color: #E0E0E0;
   display: flex;
   align-items: center;
   justify-content: center;
}
select {
   font-family: "Segoe UI", Arial, sans-serif;
   font-size: 15px;
   width: 180px;
   padding: 6px 10px;
   border-radius: 6px;
   border: 1px solid #2A2A2A;
   background-color: #1E1E1E;
   color: #F5F5F5;
   transition: border-color 0.2s ease, box-shadow 0.2s ease;
}
select:focus {
   outline: none;
   border-color: #5C6BC0;
   box-shadow: 0 0 0 2px rgba(92, 107, 192, 0.35);
}
.title {
   color: #FFFFFF;
   font-size: 24px;
   font-weight: 600;
   margin-bottom: 20px;
   text-align: left;
}
.prompt {
   color: #C1C6D7;
   font-size: 14px;
   text-align: left;
   padding-right: 16px;
}
.options_table {
   border: none;
}
.options {
   background-color: rgba(30, 30, 30, 0.95);
   border-radius: 16px;
   padding: 36px 44px;
   box-shadow: 0 16px 40px rgba(0, 0, 0, 0.45);
   min-width: 420px;
}
.options table {
   width: 100%;
   border-collapse: separate;
   border-spacing: 0 12px;
}
.options td {
   vertical-align: middle;
}
</style>
<script type="text/javascript" src="jquery.min.js"></script>
<script type="text/javascript" src="options.js"></script>
</head>

<body>
<table cellspacing="0" cellpadding="0" class="options_table">
<tr><td class="options" align="center">
<div class="title">sTabControl Options</div>
<table cellspacing="0" cellpadding="0" border="0">
<tr>
<td nowrap class="prompt">Position of a new tab:</td>
<td nowrap align="right" width="100%">
<select id="tabsBehaviour">
<option value="default" selected>*** default ***</option>
<option value="first">first</option>
<option value="left">next left</option>
<option value="right">next right</option>
<option value="last">last</option>
</select>
</td>
</tr>
<tr>
<td nowrap class="prompt">After closing go to:</td>
<td nowrap align="right" width="100%">
<select id="tabsActivate">
<option value="default">*** default ***</option>
<option value="last_used">last used tab</option>
<option value="left">left tab</option>
<option value="right">right tab</option>
</select>
</td>
</tr>
<tr>
<td nowrap class="prompt">Open a new tab in:</td>
<td nowrap align="right" width="100%">
<select id="tabsOpenMethod">
<option value="default">*** default ***</option>
<option value="foreground">foreground</option>
<option value="background">background</option>
</select>
</td>
</tr>
</table>
</td></tr></table>
</body>
